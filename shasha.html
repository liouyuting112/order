<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shasha</title>
  <link rel="stylesheet" href="shasha.css" />
</head>
<body>
  <div class="mobile-screen">
    <div class="top-image-container">
      <img src="images/shasha01.png" alt="SHASHA" class="top-image" />
      <div class="logo-overlay">
        <img src="images/logo01.png" alt="Logo" class="logo-icon" />
        <div class="logo-text">Pawffee</div>
      </div>
         <a href="cat-intro.html">
        <img src="images/arrow.png" alt="arrow" class="logo-arrow" />
        </a>
    </div>

<div class="bottom-scroll-wrapper" id="bottom-scroll-wrapper">
  <div class="bottom-scroll-track" id="bottom-scroll-track">
    
    <!-- 第一個矩形：JIMU 貓咪詳細資訊群組 -->
    <div class="bottom-panel first-panel">
      <div class="brown-box">
        <div class="brown-content">
          <span class="brown-text">SHASHA</span>
          <img src="images/woman.png" alt="woman" class="brown-image" />
        </div>
      </div>
      <!-- 其他內容 -->
      <div class="food-list">
        <div class="food-pair">
          <div class="small-box">
            <img src="images/yum.png" alt="yum" class="image" />
            <div class="yum-text">Yum!</div>
          </div>
          <div class="white-box">
            <div class="white-box-text">
              Meat purée, dry food, freeze-dried snacks
            </div>
          </div>
        </div>
        <div class="food-pair">
          <div class="small-box">
            <img src="images/love.png" alt="yum" class="image" />
            <div class="yum-text">Pet me</div>
          </div>
          <div class="white-box">
            <div class="white-box-text">Head, face</div>
          </div>
        </div>
        <div class="food-pair">
          <div class="small-box">
            <img src="images/nope.png" alt="yum" class="image" />
            <div class="yum-text">Nope!</div>
          </div>
          <div class="white-box">
            <div class="white-box-text">Belly, paws</div>
          </div>
        </div>
        <div class="food-pair">
          <div class="small-box">
            <img src="images/like.png" alt="yum" class="image" />
            <div class="yum-text">Like</div>
          </div>
          <div class="white-box">
            <div class="white-box-text">
              Meat purée, dry food, freeze-dried snacks
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 第二個矩形：獨立內容 -->
<div class="bottom-panel">
  <div class="brown-box">
    <div class="brown-content">
      <span class="brown-text">SHASHA</span>
      <img src="images/woman.png" alt="woman" class="brown-image" />
    </div>
  </div>

  <!-- 👇 個性指標區塊：距離上面 20px -->
  <div class="traits-box">
    <div class="trait-group">
      <div class="trait-title">Affection Level</div>
      <div class="trait-bar-bg">
        <div class="trait-bar" style="width: 224px;"></div>
      </div>
    </div>
    <div class="trait-group">
      <div class="trait-title">Food Drive</div>
      <div class="trait-bar-bg">
        <div class="trait-bar" style="width: 325px;"></div>
      </div>
    </div>
    <div class="trait-group">
      <div class="trait-title">Playfulness</div>
      <div class="trait-bar-bg">
        <div class="trait-bar" style="width: 159px;"></div>
      </div>
    </div>
    <div class="trait-group">
      <div class="trait-title">Touch Tolerance</div>
      <div class="trait-bar-bg">
        <div class="trait-bar" style="width: 233px;"></div>
      </div>
    </div>
  </div>
</div>

<script src="cat.js"></script>
</body>
</html>
